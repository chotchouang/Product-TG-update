<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance TG Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- Constants ---
        const TEAM_DATA = {
            "Team 1": [
                { id: "MLPR_Wisarut.moo", label: "ดี้" },
                { id: "MLPR_Phanupong.ko", label: "เป๊ปซี่" },
                { id: "TG_Wannarat.dou", label: "หมวย" },
                { id: "MLPR_Thanawat.utt", label: "ปาล์ม" }
            ],
            "Team 2": [
                { id: "MLPR_Patiwet.nua", label: "เบ๊บ" },
                { id: "TG_Aekkarat.ama", label: "เฟิร์ส" },
                { id: "MLPR_Oracha.wi", label: "มันแแกว" },
                { id: "MLPR_Chanokwan.kan", label: "เดีย" },
                { id: "MLPR_Kanthika.nap", label: "ฟีม" }
            ],
            "Team 3": [
                { id: "MLPR_Phogsakorn.wad", label: "ปอร์" },
                { id: "TG_Auttapinuya.sin", label: "ฟ้า" },
                { id: "MLPR_Surachet.th", label: "เป้" },
                { id: "MLPR_Harumi.ut", label: "มิ" },
                { id: "MLPR_Phetnarin.yae", label: "เป๋าเป้" }
            ],
            "Team 4": [
                { id: "TG_Maneerat.sae", label: "ป็อป" },
                { id: "MLPR_Pakkawat.boo", label: "ไอซ์" },
                { id: "TG_Sitthinon.kae", label: "นิว" },
                { id: "MLPR_Piyavan.see", label: "ปุ้ก" }
            ],
            "Team 5": [
                { id: "TG_Anon.cha", label: "นนท์" },
                { id: "MLPR_Siriwan.put", label: "เบียร์" },
                { id: "MLPR_Atcharaporn.ch", label: "แนน" },
                { id: "TG_Pakin.pl", label: "ซัน" }
            ],
            "Team 6": [
                { id: "TG_Kittapak.yoo", label: "ภีม" },
                { id: "TG_Kanokrat.yue", label: "มด" }
            ]
        };

        const SHIFTS = {
            'A': { label: 'กะ A (05:00 - 14:00)', hours: [5, 6, 7, 8, 9, 10, 11, 12, 13], crossDay: false },
            'B': { label: 'กะ B (13:00 - 22:00)', hours: [13, 14, 15, 16, 17, 18, 19, 20, 21], crossDay: false },
            'C': { label: 'กะ C (21:00 - 06:00)', hours: [21, 22, 23, 0, 1, 2, 3, 4, 5], crossDay: true },
            'none': { label: 'ไม่ระบุกะ', hours: Array.from({ length: 24 }, (_, i) => i), crossDay: false }
        };

        const OT_BUFFERS = {
            'A': { today: [1, 2, 3, 4, 14, 15, 16, 17], nextDay: [] },
            'B': { today: [9, 10, 11, 12, 22, 23], nextDay: [0, 1] },
            'C': { today: [17, 18, 19, 20], nextDay: [6, 7, 8, 9] }
        };

        const ID_TO_LABEL_MAP = Object.values(TEAM_DATA).flat().reduce((acc, emp) => {
            acc[emp.id] = emp.label;
            return acc;
        }, {});

        // --- Icons as SVG Components ---
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M17 11a4 4 0 0 0-3-3.87"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;

        const formatDateForDisplay = (isoDate) => {
            if (!isoDate) return "";
            const [yyyy, mm, dd] = isoDate.split('-');
            return `${dd}/${mm}/${yyyy}`;
        };

        const getNextDateString = (isoDate) => {
            const date = new Date(isoDate);
            date.setDate(date.getDate() + 1);
            const dd = String(date.getDate()).padStart(2, '0');
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const yyyy = date.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        };

        const App = () => {
            const [rawData, setRawData] = useState('');
            const [parsedData, setParsedData] = useState([]);
            const [individualResults, setIndividualResults] = useState([]);
            const [smartShiftTotal, setSmartShiftTotal] = useState(0);
            const [copiedIndex, setCopiedIndex] = useState(null);
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [employeeNames, setEmployeeNames] = useState(['', '', '', '', '']);
            const [selectedShift, setSelectedShift] = useState('none');

            const timeSlots = useMemo(() => Array.from({ length: 24 }, (_, i) => {
                const start = i.toString().padStart(2, '0');
                const end = i === 23 ? '00' : (i + 1).toString().padStart(2, '0');
                return `${start}-${end}`;
            }), []);

            const dateRange = useMemo(() => {
                const dates = [];
                let current = new Date(startDate);
                const end = new Date(endDate);
                let limit = 0;
                while (current <= end && limit < 31) {
                    dates.push(current.toISOString().split('T')[0]);
                    current.setDate(current.getDate() + 1);
                    limit++;
                }
                return dates;
            }, [startDate, endDate]);

            const getHourConfig = (hourIndex) => {
                if (hourIndex === 5 || hourIndex === 13 || hourIndex === 21) return { bg: 'bg-red-50', header: 'bg-red-500 text-white font-bold' };
                if (hourIndex >= 6 && hourIndex <= 12) return { bg: 'bg-sky-50', header: 'bg-sky-400 text-white' };
                if (hourIndex >= 14 && hourIndex <= 20) return { bg: 'bg-orange-50', header: 'bg-orange-400 text-white' };
                if (hourIndex >= 22 || hourIndex <= 4) return { bg: 'bg-purple-50', header: 'bg-purple-400 text-white' };
                return { bg: 'bg-slate-50', header: 'bg-slate-300 text-slate-700' };
            };

            const parseLineToData = (line, nameFilter) => {
                let cols = line.split('\t');
                if (cols.length < 2 && line.includes(',')) cols = line.split(',');
                cols = cols.map(c => c.trim());
                if (nameFilter && nameFilter.trim() !== "") {
                    const idx = cols.findIndex(c => c.toLowerCase().includes(nameFilter.trim().toLowerCase()));
                    if (idx !== -1) {
                        const hourly = Array(24).fill(0);
                        cols.slice(idx + 1).forEach((val, i) => {
                            if (i < 24) {
                                const n = parseFloat((val || "0").replace(/,/g, ''));
                                hourly[i] = isNaN(n) ? 0 : n;
                            }
                        });
                        return { name: cols[idx], hourly };
                    }
                }
                return null;
            };

            const processData = useCallback(() => {
                if (!rawData.trim()) {
                    setParsedData([]); setSmartShiftTotal(0); setIndividualResults([]);
                    return;
                }
                const rows = rawData.trim().split(/\r?\n/);
                const shiftConfig = SHIFTS[selectedShift];
                const activeNames = employeeNames.filter(n => n.trim() !== "");
                const newRows = [];
                let grandTotal = 0;
                const results = [];

                activeNames.forEach((target, idx) => {
                    let actualName = target;
                    const personDates = {};
                    let personTotal = 0;

                    dateRange.forEach((dateVal, dIdx) => {
                        const dStr = formatDateForDisplay(dateVal);
                        const nStr = getNextDateString(dateVal);
                        let todayHourly = Array(24).fill(0);
                        let found = false;
                        const line = rows.find(r => r.includes(dStr) && r.toLowerCase().includes(target.toLowerCase()));

                        if (line) {
                            const p = parseLineToData(line, target);
                            if (p) {
                                todayHourly = p.hourly; actualName = p.name; found = true;
                                newRows.push({ isNextDay: false, seq: dIdx === 0 ? idx + 1 : "", data: [dStr, dIdx === 0 ? idx + 1 : "", p.name, ...p.hourly, p.hourly.reduce((a, b) => a + b, 0).toLocaleString()] });
                            }
                        } else {
                            newRows.push({ isNextDay: false, seq: dIdx === 0 ? idx + 1 : "", data: [dStr, dIdx === 0 ? idx + 1 : "", target, ...Array(24).fill("-"), "0"] });
                        }

                        let shiftVal = 0; let otVal = 0; let nextDayData = null;
                        if (shiftConfig.crossDay) {
                            shiftVal = shiftConfig.hours.filter(h => h >= 21).reduce((s, h) => s + todayHourly[h], 0);
                            const nLine = rows.find(r => r.includes(nStr) && r.toLowerCase().includes(target.toLowerCase()));
                            if (nLine) {
                                const np = parseLineToData(nLine, target);
                                if (np) {
                                    nextDayData = np.hourly;
                                    shiftVal += shiftConfig.hours.filter(h => h < 6).reduce((s, h) => s + np.hourly[h], 0);
                                    newRows.push({ isNextDay: true, seq: "", data: [nStr, "", np.name, ...np.hourly, np.hourly.reduce((a, b) => a + b, 0).toLocaleString()] });
                                }
                            }
                        } else {
                            shiftVal = shiftConfig.hours.reduce((s, h) => s + todayHourly[h], 0);
                        }

                        if (selectedShift !== 'none') {
                            const buffer = OT_BUFFERS[selectedShift];
                            buffer.today.forEach(h => { if (todayHourly[h] > 0) otVal += todayHourly[h]; });
                            if (buffer.nextDay.length > 0) {
                                if (!nextDayData) {
                                    const nLineEx = rows.find(r => r.includes(nStr) && r.toLowerCase().includes(target.toLowerCase()));
                                    if (nLineEx) { const npx = parseLineToData(nLineEx, target); if (npx) nextDayData = npx.hourly; }
                                }
                                if (nextDayData) buffer.nextDay.forEach(h => { if (nextDayData[h] > 0) otVal += nextDayData[h]; });
                            }
                        }

                        const dayTotal = shiftVal + otVal;
                        personDates[dateVal] = { total: dayTotal, hasOt: otVal > 0, missing: !found && !nextDayData };
                        personTotal += dayTotal;
                    });

                    grandTotal += personTotal;
                    results.push({ id: target, name: ID_TO_LABEL_MAP[target] || actualName, dates: personDates, total: personTotal });
                });

                setParsedData(newRows); setSmartShiftTotal(grandTotal); setIndividualResults(results);
            }, [rawData, dateRange, employeeNames, selectedShift]);

            useEffect(() => { const t = setTimeout(processData, 500); return () => clearTimeout(t); }, [rawData, employeeNames, selectedShift, processData]);

            const copy = (val, id) => {
                const el = document.createElement("textarea"); el.value = val; document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
                setCopiedIndex(id); setTimeout(() => setCopiedIndex(null), 2000);
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
                    <header className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg text-white"><IconChart /></div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800">Performance TG</h1>
                                <p className="text-slate-500 text-sm">รวมข้อมูลพนักงานใหม่ Team 6 เรียบร้อยแล้ว</p>
                            </div>
                        </div>
                        <button onClick={() => { setRawData(''); setEmployeeNames(['','','','','']); }} className="flex items-center gap-2 text-rose-600 font-bold px-4 py-2 rounded-xl hover:bg-rose-50 transition-all"><IconTrash /> ล้างข้อมูล</button>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">1. ช่วงวันที่และกะ</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-sm font-bold outline-none" />
                                <input type="date" value={endDate} min={startDate} onChange={e => setEndDate(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-sm font-bold outline-none" />
                            </div>
                            <select value={selectedShift} onChange={e => setSelectedShift(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-4 py-3 text-sm font-bold outline-none cursor-pointer">
                                {Object.entries(SHIFTS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                            </select>
                        </div>

                        <div className="lg:col-span-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col gap-4">
                            <div className="flex justify-between items-center">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">2. รายชื่อพนักงาน</h2>
                                <div className="flex flex-wrap gap-2">
                                    {Object.keys(TEAM_DATA).map(t => (
                                        <button key={t} onClick={() => {
                                            const m = TEAM_DATA[t].map(x => x.id); while (m.length < 5) m.push('');
                                            setEmployeeNames(m.slice(0, 5));
                                        }} className="text-[10px] font-bold px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">{t}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                {employeeNames.map((n, i) => (
                                    <select key={i} value={n} onChange={e => { const u = [...employeeNames]; u[i] = e.target.value; setEmployeeNames(u); }} className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none cursor-pointer">
                                        <option value="">-- เลือกพนักงาน --</option>
                                        {Object.entries(TEAM_DATA).map(([tn, ms]) => (
                                            <optgroup key={tn} label={tn}>{ms.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}</optgroup>
                                        ))}
                                    </select>
                                ))}
                            </div>
                        </div>
                    </div>

                    {parsedData.length > 0 && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                            <div className="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                                <h3 className="text-lg font-black text-slate-800">สรุปผลลัพธ์สุทธิ</h3>
                                <div className="bg-indigo-600 px-6 py-3 rounded-2xl text-white flex items-center gap-4">
                                    <span className="text-xs font-bold opacity-70">ยอดรวมทั้งสิ้น:</span>
                                    <span className="text-2xl font-black">{smartShiftTotal.toLocaleString()}</span>
                                </div>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-slate-50 text-slate-400 font-black text-[10px] uppercase">
                                        <tr>
                                            <th className="px-6 py-4 text-left">พนักงาน</th>
                                            {dateRange.map((d, i) => <th key={i} className="px-4 py-4 text-center border-l min-w-[120px]">{formatDateForDisplay(d)}</th>)}
                                            <th className="px-6 py-4 text-center bg-indigo-50 text-indigo-600 border-l">รวม</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {individualResults.map((p, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                <td onClick={() => copy(dateRange.map(d => p.dates[d].total).join('\t'), `r-${p.id}`)} className="px-6 py-5 font-bold text-slate-700 whitespace-nowrap cursor-pointer relative group">
                                                    {p.name} <IconCopy />
                                                    {copiedIndex === `r-${p.id}` && <div className="absolute right-0 top-2 bg-emerald-500 text-white text-[10px] px-2 py-1 rounded">Copied</div>}
                                                </td>
                                                {dateRange.map((d, di) => {
                                                    const dd = p.dates[d];
                                                    return (
                                                        <td key={di} onClick={() => copy(dd.total, `${p.id}-${d}`)} className={`px-4 py-5 text-center border-l cursor-pointer relative ${dd.hasOt ? 'bg-yellow-50' : ''}`}>
                                                            <div className={`text-lg font-black ${dd.missing ? 'text-slate-200' : 'text-slate-800'}`}>{dd.total.toLocaleString()}</div>
                                                            {dd.hasOt && <div className="text-[9px] font-bold text-yellow-600">+OT</div>}
                                                            {copiedIndex === `${p.id}-${d}` && <div className="absolute inset-0 bg-emerald-500 text-white text-[10px] flex items-center justify-center">Copied</div>}
                                                        </td>
                                                    );
                                                })}
                                                <td onClick={() => copy(p.total, `t-${p.id}`)} className="px-6 py-5 bg-indigo-50/50 text-center border-l font-black text-xl text-indigo-600 cursor-pointer relative">
                                                    {p.total.toLocaleString()}
                                                    {copiedIndex === `t-${p.id}` && <div className="absolute inset-0 bg-emerald-500 text-white text-[10px] flex items-center justify-center">Copied</div>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b flex items-center justify-between">
                            <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest">3. วางข้อมูลดิบ (Ctrl+V)</h3>
                        </div>
                        <textarea className="w-full h-48 p-6 text-xs font-mono outline-none resize-none" placeholder="คัดลอกข้อมูลจากตาราง Performance มาวางที่นี่..." value={rawData} onChange={e => setRawData(e.target.value)} />
                    </div>

                    <div className="overflow-x-auto bg-white rounded-3xl border border-slate-200 mb-10">
                        <table className="w-full text-[10px] whitespace-nowrap">
                            <thead>
                                <tr className="bg-slate-50 border-b">
                                    <th className="px-4 py-3 text-left">วันที่</th>
                                    <th className="px-4 py-3 text-left">พนักงาน</th>
                                    {timeSlots.map((t, i) => <th key={i} className={`px-2 py-3 text-center min-w-[45px] ${getHourConfig(i).header}`}>{t}</th>)}
                                    <th className="px-4 py-3 bg-slate-100 font-bold">รวม</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {parsedData.length === 0 ? (
                                    <tr><td colSpan={27} className="py-10 text-center text-slate-300 italic">รอการวางข้อมูล...</td></tr>
                                ) : (
                                    parsedData.map((r, i) => (
                                        <tr key={i} className={`hover:bg-slate-50/50 ${r.isNextDay ? 'bg-slate-50/20' : ''}`}>
                                            <td className="px-4 py-2 border-r">{r.data[0]}</td>
                                            <td className={`px-4 py-2 font-bold border-r ${r.isNextDay ? 'italic text-slate-400' : ''}`}>{r.isNextDay ? '↳ ' : ''}{r.data[2]}</td>
                                            {r.data.slice(3, 27).map((c, ci) => (
                                                <td key={ci} className={`px-2 py-2 text-right border-r font-bold ${getHourConfig(ci).bg}`}>{c}</td>
                                            ))}
                                            <td className="px-4 py-2 text-right bg-indigo-50 font-black">{r.data[27]}</td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
